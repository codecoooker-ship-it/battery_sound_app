name: bsn
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- App Specific Packages ---

  # UI & Styling
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.2

  # Battery & Device Logic
  battery_plus: ^6.0.0

  # Background Service & Notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.1.2

  # Audio, TTS & File Picker
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.0
  file_picker: ^8.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # আমাদের লোকাল অডিও ফাইলটি এখানে যুক্ত করা হলো
